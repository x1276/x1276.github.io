<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>START</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/parallax/3.1.0/parallax.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;700&family=Courier+Prime&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --red:   #C0392B; --red2:  #922b21;
      --grey1: #1c1c1c; --grey2: #2e2e2e; --grey3: #4a4a4a;
      --grey4: #7a7a7a; --grey5: #b0b0b0; --cream: #d4cfc8;
    }
    html, body { width:100%; height:100%; overflow:hidden; background:var(--grey1); font-family:'Oswald',sans-serif; cursor:crosshair; }
    /* FIX 1: Firefox Linux font blur */
    * { -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; }

    /* ── SCENE ── */
    #scene { width:100vw; height:100vh; position:relative; overflow:hidden; }
    .layer { position:absolute; width:100%; height:100%; top:0; left:0; }

    /* ── SKY ── */
    #layer-sky { overflow:visible; }
    .sky-fill {
      position:absolute; top:-20%; left:-20%; width:140%; height:140%;
      background:linear-gradient(180deg,#0d0d12 0%,#1a1220 15%,#2d1a1a 35%,#5c2e1e 55%,#8b3a1a 70%,#b5501f 82%,#c4622d 90%,#cf7a3a 100%);
    }
    .sky-fill::after {
      content:''; position:absolute; inset:0;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      opacity:0.18; pointer-events:none;
    }

    /* ── SUN ── */
    #layer-sun { display:flex; align-items:flex-end; justify-content:center; }
    .sun-wrap { position:absolute; bottom:38%; left:50%; transform:translateX(-50%); }
    .sun {
      width:90px; height:90px; border-radius:50%;
      background:radial-gradient(circle at 50% 50%,#f5d49a 0%,#e8963a 40%,#c4622d 70%,transparent 100%);
      box-shadow:0 0 40px 20px rgba(196,98,45,0.5),0 0 100px 60px rgba(196,98,45,0.2),0 0 200px 120px rgba(140,58,26,0.1);
      animation:pulse 5s ease-in-out infinite;
      will-change:box-shadow;
    }
    @keyframes pulse {
      0%,100% { box-shadow:0 0 40px 20px rgba(196,98,45,0.52),0 0 100px 60px rgba(196,98,45,0.22),0 0 200px 120px rgba(140,58,26,0.12); }
      50%     { box-shadow:0 0 58px 32px rgba(210,110,40,0.68),0 0 130px 82px rgba(196,98,45,0.36),0 0 260px 150px rgba(140,58,26,0.20); }
    }

    /* ── MOUNTAINS — responsive ──
       Landscape: width-driven (130% wide), capped at 30vh
       Portrait:  height-driven (22vh), centered, overflow ok
    ── */
    #layer-mountains1 svg,
    #layer-mountains2 svg,
    #layer-mountains3 svg {
      position:absolute; bottom:8%;
      width:150%; left:-25%; height:auto;
    }
    @media (max-aspect-ratio:1/1) {
      #layer-mountains1 svg,
      #layer-mountains2 svg,
      #layer-mountains3 svg {
        width:auto; height:22vh; max-height:none;
        left:50%; transform:translateX(-50%);
      }
    }

    /* ── FOG ── */
    .fog-band {
      position:absolute; bottom:32%; left:-10%; right:-10%; height:60px;
      background:linear-gradient(180deg,transparent 0%,rgba(180,130,100,0.07) 40%,rgba(180,130,100,0.12) 60%,transparent 100%);
      filter:blur(8px);
    }

    /* ── FOREGROUND ── */
    #layer-foreground svg { position:absolute; bottom:0; width:100%; }
    .grid-lines {
      position:absolute; inset:0;
      background-image:linear-gradient(rgba(192,57,43,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(192,57,43,0.04) 1px,transparent 1px);
      background-size:80px 80px; pointer-events:none;
    }

    /* ── SETTINGS BUTTON — only visible in bottom-left 15%×15% zone ── */
    #settings-zone {
      position:fixed; bottom:0; left:0;
      width:15vw; height:15vh;
      z-index:199; pointer-events:all;
    }
    #settings-btn {
      position:fixed; bottom:24px; left:28px; z-index:200;
      width:32px; height:32px; background:transparent;
      border:1.5px solid var(--grey3); cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      opacity:0; pointer-events:none;
      transition:opacity 0.3s, border-color 0.2s;
    }
    #settings-zone:hover ~ #settings-btn,
    #settings-btn:hover { opacity:1; pointer-events:all; }
    #settings-btn:hover { border-color:var(--red); }
    #settings-btn.spinning svg { animation:gear-spin 1.25s cubic-bezier(0.4,0,0.2,1) forwards; }
    @keyframes gear-spin {
      0%  {transform:rotate(0deg);}   40% {transform:rotate(200deg);}
      70% {transform:rotate(290deg);} 85% {transform:rotate(340deg);}
      93% {transform:rotate(355deg);} 100%{transform:rotate(360deg);}
    }

    /* ── SETTINGS PANEL ANIMATION ── */
    #ui-body { width:100%; overflow:hidden; max-height:80px; transition:max-height 180ms cubic-bezier(0.7,0,0.9,1); }
    #ui-body.expanded { max-height:520px; transition:max-height 220ms cubic-bezier(0.2,0,0.4,1); }

    #search-view { width:100%; opacity:1; transform:translateY(0); transition:opacity 140ms ease-in,transform 140ms ease-in; }
    #search-view.hiding  { opacity:0; transform:translateY(-6px); pointer-events:none; }
    #search-view.hidden  { display:none; opacity:0; }
    #search-view.visible { opacity:1; transform:translateY(0); }

    #settings-panel {
      display:none; flex-direction:column; gap:0; width:100%;
      opacity:1; transform:translateY(0);
      transition:opacity 150ms ease-in 180ms, transform 150ms ease-in 180ms;
    }
    #settings-panel.active  { display:flex; }
    #settings-panel.visible { opacity:1; transform:translateY(0); transition:opacity 160ms ease-out 100ms,transform 160ms ease-out 100ms; }
    #settings-panel.hiding  { opacity:0; transform:translateY(-4px); transition:opacity 100ms ease-in 80ms, transform 100ms ease-in 80ms; }

    /* ── SETTINGS ROWS ── */
    .setting-row { display:flex; align-items:center; border-bottom:1px solid var(--grey2); padding:9px 14px; gap:12px; }
    .setting-row:last-child { border-bottom:none; }
    .setting-label { font-family:'Courier Prime',monospace; font-size:10px; letter-spacing:0.2em; color:var(--grey4); text-transform:uppercase; min-width:130px; flex-shrink:0; }
    .setting-value { font-family:'Courier Prime',monospace; font-size:12px; color:var(--cream); background:transparent; border:none; outline:none; flex:1; caret-color:var(--red); letter-spacing:0.05em; }
    .setting-value:focus { color:#fff; }
    select.setting-value { cursor:pointer; background:transparent; color:var(--cream); }
    select.setting-value option { background:#1a1210; color:var(--cream); }
    .setting-save { font-family:'Oswald',sans-serif; font-size:10px; letter-spacing:0.3em; color:var(--red); background:transparent; border:1px solid var(--red); padding:3px 10px; cursor:pointer; text-transform:uppercase; transition:background 0.15s,color 0.15s; flex-shrink:0; }
    .setting-save:hover { background:var(--red); color:var(--cream); }

    /* ── SEARCH UI ── */
    #ui { position:fixed; top:38%; left:50%; transform:translate(-50%,-50%); z-index:100; display:flex; flex-direction:column; align-items:center; gap:0; width:min(560px,90vw); }
    .ui-label { font-family:'Oswald',sans-serif; font-weight:700; font-size:10px; letter-spacing:0.4em; color:var(--red); text-transform:uppercase; margin-bottom:10px; opacity:0.85; }
    .search-wrap { width:100%; display:flex; align-items:stretch; border:1.5px solid var(--grey3); background:rgba(18,14,12,0.92); transition:border-color 0.2s; }
    .search-wrap:focus-within { border-color:var(--red); }
    #search-input { flex:1; background:transparent; border:none; outline:none; padding:0 18px; height:48px; font-family:'Courier Prime',monospace; font-size:15px; line-height:48px; color:var(--cream); letter-spacing:0.05em; caret-color:var(--red); }
    #search-input::placeholder { color:var(--grey3); letter-spacing:0.03em; font-size:11px; }
    #search-btn { background:var(--red); border:none; padding:0 20px; height:48px; cursor:pointer; color:var(--cream); font-family:'Oswald',sans-serif; font-weight:700; font-size:12px; letter-spacing:0.3em; text-transform:uppercase; transition:background 0.15s; flex-shrink:0; }
    #search-btn:hover { background:var(--red2); }
    #search-btn:active { background:#7b241c; }
    .engine-badge { align-self:flex-end; margin-top:7px; font-family:'Courier Prime',monospace; font-size:10px; letter-spacing:0.25em; color:var(--grey4); text-transform:uppercase; width:100%; text-align:right; }
    .engine-badge span { color:var(--red); }

    /* ── MISC ── */
    .corner-mark { position:fixed; bottom:22px; right:28px; font-family:'Oswald',sans-serif; font-weight:300; font-size:10px; letter-spacing:0.35em; color:var(--grey3); text-transform:uppercase; z-index:99; }
    #clock { position:fixed; top:24px; left:30px; z-index:99; font-family:'Oswald',sans-serif; font-weight:300; letter-spacing:0.2em; }
    #clock .time { font-size:28px; color:var(--cream); line-height:1; }
    #clock .date { font-size:10px; color:var(--grey4); letter-spacing:0.35em; margin-top:4px; text-transform:uppercase; }
    .accent-bar { position:fixed; top:0; left:0; width:3px; height:100vh; background:var(--red); opacity:0.7; z-index:200; }
    #player { position:fixed; top:20px; right:28px; z-index:200; display:flex; align-items:center; gap:10px; font-family:'Oswald',sans-serif; }
    #player-track { font-size:9px; letter-spacing:0.25em; color:var(--grey4); text-transform:uppercase; max-width:160px; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; text-align:right; }
    #player-btn { background:transparent; border:1.5px solid var(--grey3); width:32px; height:32px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:border-color 0.15s; }
    #player-btn:hover { border-color:var(--red); }
    #debug-panel { display:none; position:fixed; top:calc(38% + 10px); left:50%; transform:translateX(-50%); z-index:101; width:min(560px,90vw); padding:8px 12px; background:rgba(10,5,5,0.85); border-left:2px solid var(--red); font-family:'Courier Prime',monospace; font-size:10px; color:#e07060; letter-spacing:0.1em; line-height:1.6; max-height:120px; overflow-y:auto; }
  </style>
</head>
<body>

  <div class="accent-bar"></div>
  <div style="position:fixed;bottom:0;left:0;width:100%;height:20vh;background:linear-gradient(to bottom,transparent 0%,#0a0806 70%);pointer-events:none;z-index:50;"></div>

  <ul id="scene">
    <li class="layer" id="layer-sky" data-depth="0.1"><div class="sky-fill"></div></li>

    <li class="layer" id="layer-grid" data-depth="0.12">
      <div style="position:absolute;top:-20%;left:-20%;width:140%;height:140%;background-image:linear-gradient(rgba(192,57,43,0.06) 1px,transparent 1px),linear-gradient(90deg,rgba(192,57,43,0.06) 1px,transparent 1px);background-size:80px 80px;pointer-events:none;"></div>
    </li>

    <li class="layer" id="layer-sun" data-depth="0.15">
      <div class="sun-wrap"><div class="sun"></div></div>
    </li>

    <li class="layer" id="layer-mountains1" data-depth="0.25">
      <svg viewBox="-800 0 3040 320" preserveAspectRatio="xMidYMax meet" xmlns="http://www.w3.org/2000/svg" style="position:absolute;bottom:0;">
        <g id="mtn-drift-1">
          <polygon points="-800,320 -800,155 -680,115 -560,145 -440,100 -320,138 -200,108 -100,148 -20,170 80,110 180,155 280,90 400,140 520,75 640,125 760,65 880,115 1000,55 1120,105 1240,75 1360,115 1440,85 1560,120 1680,70 1800,115 1920,80 2020,110 2120,85 2240,120 2360,75 2480,115 2580,90 2700,130 2700,320" fill="#3d2a22" opacity="0.75"/>
        </g>
      </svg>
    </li>

    <li class="layer" id="layer-mountains2" data-depth="0.4">
      <svg viewBox="-800 0 3040 320" preserveAspectRatio="xMidYMax meet" xmlns="http://www.w3.org/2000/svg" style="position:absolute;bottom:0;">
        <g id="mtn-drift-2">
          <polygon points="-800,320 -800,175 -680,135 -560,168 -440,128 -320,162 -200,132 -80,172 20,215 120,155 240,195 340,130 460,175 580,110 700,155 820,95 940,145 1060,90 1180,140 1300,85 1420,130 1540,100 1660,140 1780,90 1900,135 2020,95 2140,130 2260,100 2380,140 2500,95 2620,135 2700,175 2700,320" fill="#2a1e1a" opacity="0.9"/>
        </g>
      </svg>
    </li>

    <li class="layer" id="layer-mountains3" data-depth="0.55">
      <svg viewBox="-800 0 3040 320" preserveAspectRatio="xMidYMax meet" xmlns="http://www.w3.org/2000/svg" style="position:absolute;bottom:0;">
        <defs>
          <clipPath id="snow-clip">
            <rect x="-560" y="168" width="80"  height="63"/>
            <rect x="-320" y="158" width="80"  height="63"/>
            <rect x="380"  y="150" width="80"  height="63"/>
            <rect x="615"  y="140" width="90"  height="63"/>
            <rect x="850"  y="134" width="95"  height="63"/>
            <rect x="1088" y="130" width="100" height="63"/>
            <rect x="1330" y="144" width="90"  height="63"/>
            <rect x="2040" y="148" width="80"  height="63"/>
            <rect x="2280" y="138" width="80"  height="63"/>
          </clipPath>
        </defs>
        <g id="mtn-drift-3">
          <polygon points="-800,320 -800,242 -720,222 -640,248 -560,215 -480,242 -400,244 -320,218 -240,202 -160,245 -80,202 0,248 60,250 120,220 180,205 240,248 300,250 360,215 420,198 480,245 540,248 600,210 660,188 720,238 780,240 840,195 900,182 960,232 1020,235 1080,192 1140,178 1200,228 1260,230 1320,196 1380,192 1440,232 1500,235 1560,196 1620,188 1680,230 1740,232 1800,198 1860,195 1940,225 2060,210 2120,235 2180,196 2240,192 2300,230 2360,232 2420,200 2500,215 2580,232 2660,210 2700,242 2700,320" fill="#1a1210"/>
          <polygon points="-800,320 -800,242 -720,222 -640,248 -560,215 -480,242 -400,244 -320,218 -240,202 -160,245 -80,202 0,248 60,250 120,220 180,205 240,248 300,250 360,215 420,198 480,245 540,248 600,210 660,188 720,238 780,240 840,195 900,182 960,232 1020,235 1080,192 1140,178 1200,228 1260,230 1320,196 1380,192 1440,232 1500,235 1560,196 1620,188 1680,230 1740,232 1800,198 1860,195 1940,225 2060,210 2120,235 2180,196 2240,192 2300,230 2360,232 2420,200 2500,215 2580,232 2660,210 2700,242 2700,320" fill="#d4d0c9" opacity="0.5" clip-path="url(#snow-clip)"/>
        </g>
      </svg>
    </li>

    <li class="layer" id="layer-fog" data-depth="0.65"><div class="fog-band"></div></li>

    <li class="layer" id="layer-foreground" data-depth="0.82">
      <svg viewBox="-300 0 2040 120" preserveAspectRatio="xMidYMax meet" xmlns="http://www.w3.org/2000/svg" style="position:absolute;bottom:-4%;width:130%;left:-15%;height:auto;">
        <rect x="-300" y="60" width="2640" height="60" fill="#0f0b09"/>
        <rect x="-300" y="57" width="2640" height="3" fill="#C0392B" opacity="0.6"/>
      </svg>
      <div class="grid-lines" style="display:none;"></div>
    </li>
  </ul>

  <!-- settings hover zone -->
  <div id="settings-zone"></div>
  <button id="settings-btn" title="Settings">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="7" cy="7" r="2" stroke="#7a7a7a" stroke-width="1.2"/>
      <path d="M7 1v1.5M7 11.5V13M1 7h1.5M11.5 7H13M2.93 2.93l1.06 1.06M10.01 10.01l1.06 1.06M2.93 11.07l1.06-1.06M10.01 3.99l1.06-1.06" stroke="#7a7a7a" stroke-width="1.2" stroke-linecap="square"/>
    </svg>
  </button>

  <div id="ui">
    <div class="ui-label" id="ui-label">// search //</div>
    <div id="ui-body">
      <div id="search-view">
        <div class="search-wrap">
          <input id="search-input" type="text" placeholder="SEARCH..." autocomplete="off" spellcheck="false" autofocus/>
          <button id="search-btn" type="button">GO</button>
        </div>
        <div class="engine-badge" id="engine-badge">via <span id="engine-name">duckduckgo</span></div>
      </div>

      <div id="settings-panel">
        <div class="search-wrap" style="flex-direction:column;padding:0;">
          <div class="setting-row">
            <span class="setting-label">search engine</span>
            <select class="setting-value" id="cfg-engine">
              <option value="duckduckgo">duckduckgo</option>
              <option value="google">google</option>
              <option value="brave">brave</option>
              <option value="bing">bing</option>
            </select>
          </div>
          <div class="setting-row">
            <span class="setting-label">jokes file</span>
            <input class="setting-value" id="cfg-jokes" type="text" spellcheck="false"/>
            <button class="setting-save" id="cfg-jokes-save">apply</button>
          </div>
          <div class="setting-row">
            <span class="setting-label">playlist dir</span>
            <input class="setting-value" id="cfg-playlist" type="text" spellcheck="false"/>
            <button class="setting-save" id="cfg-playlist-save">apply</button>
          </div>
          <div class="setting-row">
            <span class="setting-label">parallax x</span>
            <input class="setting-value" id="cfg-scalarx" type="number" min="1" max="30" spellcheck="false"/>
          </div>
          <div class="setting-row">
            <span class="setting-label">parallax y</span>
            <input class="setting-value" id="cfg-scalary" type="number" min="1" max="30" spellcheck="false"/>
          </div>
          <div class="setting-row">
            <span class="setting-label">sun position</span>
            <input class="setting-value" id="cfg-sunpos" type="number" min="10" max="80"/>
            <span class="setting-label" style="min-width:20px;text-align:right;">%</span>
          </div>
          <div class="setting-row">
            <span class="setting-label">pulse speed</span>
            <input class="setting-value" id="cfg-pulse" type="number" min="1" max="20"/>
            <span class="setting-label" style="min-width:20px;text-align:right;">s</span>
          </div>
          <div class="setting-row">
            <span class="setting-label">accent color</span>
            <input class="setting-value" id="cfg-accent" type="text" spellcheck="false" placeholder="#C0392B"/>
            <button class="setting-save" id="cfg-accent-save">apply</button>
          </div>
          <div class="setting-row">
            <span class="setting-label">debug mode</span>
            <select class="setting-value" id="cfg-debug">
              <option value="false">off</option>
              <option value="true">on</option>
            </select>
          </div>
          <div class="setting-row" style="justify-content:flex-end;border-top:1px solid var(--grey2);">
            <button class="setting-save" id="cfg-save-all">// save all //</button>
          </div>
        </div>
        <div class="engine-badge" style="margin-top:7px;opacity:0.5;">esc to close</div>
      </div>
    </div>
  </div>

  <div id="player">
    <div id="player-track">—</div>
    <button id="player-btn">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="#d4cfc8">
        <polygon id="icon-play" points="2,1 11,6 2,11"/>
        <g id="icon-pause" style="display:none">
          <rect x="1" y="1" width="3.5" height="10"/>
          <rect x="7.5" y="1" width="3.5" height="10"/>
        </g>
      </svg>
    </button>
  </div>

  <div id="debug-panel"></div>

  <div id="clock">
    <div class="time" id="time-display">00:00</div>
    <div class="date" id="date-display">MON · 00 JAN</div>
  </div>
  <div class="corner-mark">АЛТАЙ · START</div>

  <script>
    const SETTINGS = {
      search: {
        engine: "duckduckgo",
        engines: { duckduckgo:"https://duckduckgo.com/?q=", google:"https://www.google.com/search?q=", brave:"https://search.brave.com/search?q=", bing:"https://www.bing.com/search?q=" }
      },
      parallax: { scalarX:10, scalarY:10, frictionX:0.1, frictionY:0.1 },
      theme: { accentColor:"#C0392B" },
      player: { playlistDir:"playlist/", formats:["mp3","flac","wav"] },
      jokesFile: "jokes.txt",
      sunPosition: 38,
      pulseSpeed: 5,
      debug: false
    };

    document.documentElement.style.setProperty('--red', SETTINGS.theme.accentColor);

    // ── DEBUG ──
    const debugPanel = document.getElementById('debug-panel');
    function dbg(msg) {
      if (!SETTINGS.debug) return;
      debugPanel.style.display = 'block';
      debugPanel.innerHTML += `<div>> ${msg}</div>`;
      debugPanel.scrollTop = debugPanel.scrollHeight;
    }

    // ── PARALLAX ──
    const scene    = document.getElementById('scene');
    const isMobile = /Mobi|Android|iPad|iPhone|iPod/i.test(navigator.userAgent);

    function initParallax() {
      return new Parallax(scene, {
        scalarX: SETTINGS.parallax.scalarX, scalarY: SETTINGS.parallax.scalarY,
        frictionX: SETTINGS.parallax.frictionX, frictionY: SETTINGS.parallax.frictionY,
        relativeInput: !isMobile,
        gyroscope: isMobile,
      });
    }

    let parallaxInstance;
    const needsPermission = isMobile
      && typeof DeviceOrientationEvent !== 'undefined'
      && typeof DeviceOrientationEvent.requestPermission === 'function';

    if (needsPermission) {
      // iOS Safari only
      const gyroBtn = document.createElement('div');
      gyroBtn.textContent = 'TAP TO ACTIVATE';
      gyroBtn.style.cssText = 'position:fixed;inset:0;z-index:999;display:flex;align-items:center;justify-content:center;font-family:Oswald,sans-serif;font-weight:700;font-size:11px;letter-spacing:0.5em;color:var(--red);background:rgba(10,5,5,0.6);cursor:pointer;';
      document.body.appendChild(gyroBtn);
      gyroBtn.addEventListener('click', () => {
        DeviceOrientationEvent.requestPermission()
          .then(state => { gyroBtn.remove(); dbg('Gyro: ' + state); parallaxInstance = initParallax(); })
          .catch(e => { dbg('Gyro err: ' + e.message); gyroBtn.remove(); parallaxInstance = initParallax(); });
      }, { once: true });
    } else {
      // Android, Firefox on iPad, desktop — all work without permission
      parallaxInstance = initParallax();
      if (isMobile) dbg('Gyro: no permission needed');
    }

    // ── MOUNTAIN DRIFT — throttled on mobile ──
    const PULSE_MS = SETTINGS.pulseSpeed * 1000;
    const mtnDrifts = [
      { el: document.getElementById('mtn-drift-1'), amp:2.2, phase:0    },
      { el: document.getElementById('mtn-drift-2'), amp:1.6, phase:0.4  },
      { el: document.getElementById('mtn-drift-3'), amp:1.1, phase:0.75 },
    ];
    let driftTick = 0;
    function mountainDrift(ts) {
      driftTick++;
      if (isMobile && driftTick % 2 !== 0) { requestAnimationFrame(mountainDrift); return; }
      const inv = 1 / PULSE_MS;
      mtnDrifts.forEach(({ el, amp, phase }) => {
        if (!el) return;
        const t = ((ts * inv) + phase) % 1;
        const ease = 0.5 - 0.5 * Math.cos(t * Math.PI * 2);
        el.setAttribute('transform', `translate(0,${(-amp * ease).toFixed(3)})`);
      });
      requestAnimationFrame(mountainDrift);
    }
    requestAnimationFrame(mountainDrift);

    // ── SEARCH ──
    const inp = document.getElementById('search-input');
    document.getElementById('engine-name').textContent = SETTINGS.search.engine;
    function doSearch() {
      const q = inp.value.trim();
      if (!q) return;
      window.location.href = (SETTINGS.search.engines[SETTINGS.search.engine] || SETTINGS.search.engines.duckduckgo) + encodeURIComponent(q);
    }
    document.getElementById('search-btn').addEventListener('click', doSearch);
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
    // autofocus on load
    window.addEventListener('load', () => inp.focus());

    // ── CLOCK ──
    const DAYS=['SUN','MON','TUE','WED','THU','FRI','SAT'], MONTHS=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
    function updateClock() {
      const now=new Date(), h=String(now.getHours()).padStart(2,'0'), m=String(now.getMinutes()).padStart(2,'0');
      document.getElementById('time-display').textContent=`${h}:${m}`;
      document.getElementById('date-display').textContent=`${DAYS[now.getDay()]} · ${String(now.getDate()).padStart(2,'0')} ${MONTHS[now.getMonth()]}`;
    }
    updateClock(); setInterval(updateClock, 10000);

    // ── JOKES ──
    const JOKES_FALLBACK = [
      "Появился как-то в зоне чёрный сталкер…","Слышь, у тебя патроны есть? — Есть. — А поделишься?",
      "Артефакт нашёл. Жалко, руки светятся.","Свободовец, долговец и учёный заходят в бар…",
      "— Куда идёшь? — В Припять. — Ну удачи, сталкер.","Чего боится кровосос? Фонарика и батарей.",
      "Жизнь — это зона. Артефактов мало, аномалий много.","Не буди контролёра. Он знает, о чём ты думаешь.",
      "ПДА разрядился. Теперь просто человек в противогазе.","Военные сказали: прохода нет. Болото сказало: есть.",
      "Сидорович снова поднял цены. Говорит — инфляция.","Снорк прыгнул. Мимо. Гордость не позволила признать.",
      "Выброс через 5 минут. Ближайшее укрытие — удачи.","— Что такое счастье? — Сухой схрон и полный магазин.",
      "Монолит не пустил. Даже с цветами.",
    ];
    function setRandomJoke(jokes) { inp.placeholder = jokes[Math.floor(Math.random()*jokes.length)]; }
    async function loadJokes(file) {
      try {
        const res = await fetch(file);
        if (!res.ok) throw new Error('HTTP '+res.status);
        const lines = (await res.text()).split('\n').map(l=>l.trim()).filter(l=>l&&!l.startsWith('#'));
        if (!lines.length) throw new Error('empty');
        dbg('Loaded '+lines.length+' jokes');
        setRandomJoke(lines);
      } catch(e) { dbg('jokes.txt: '+e.message); setRandomJoke(JOKES_FALLBACK); }
    }
    loadJokes(SETTINGS.jokesFile || 'jokes.txt');

    // ── SETTINGS PANEL ──
    const settingsBtn   = document.getElementById('settings-btn');
    const settingsPanel = document.getElementById('settings-panel');
    const searchView    = document.getElementById('search-view');
    const uiLabel       = document.getElementById('ui-label');
    const uiBody        = document.getElementById('ui-body');
    let settingsOpen    = false;

    function populateSettings() {
      document.getElementById('cfg-engine').value   = SETTINGS.search.engine;
      document.getElementById('cfg-jokes').value    = SETTINGS.jokesFile;
      document.getElementById('cfg-playlist').value = SETTINGS.player.playlistDir;
      document.getElementById('cfg-scalarx').value  = SETTINGS.parallax.scalarX;
      document.getElementById('cfg-scalary').value  = SETTINGS.parallax.scalarY;
      document.getElementById('cfg-sunpos').value   = SETTINGS.sunPosition;
      document.getElementById('cfg-pulse').value    = SETTINGS.pulseSpeed;
      document.getElementById('cfg-accent').value   = SETTINGS.theme.accentColor;
      document.getElementById('cfg-debug').value    = String(SETTINGS.debug);
    }

    function openSettings() {
      settingsOpen = true; populateSettings();
      uiLabel.textContent = '// settings //';
      searchView.classList.remove('visible');
      searchView.classList.add('hiding');
      setTimeout(() => {
        searchView.classList.add('hidden'); searchView.classList.remove('hiding');
        settingsPanel.classList.remove('hiding'); settingsPanel.classList.add('active');
        uiBody.classList.add('expanded');
        requestAnimationFrame(() => requestAnimationFrame(() => settingsPanel.classList.add('visible')));
      }, 140);
    }

    function closeSettings() {
      settingsOpen = false;
      uiLabel.textContent = '// search //';
      // fade out settings content immediately
      settingsPanel.classList.remove('visible'); settingsPanel.classList.add('hiding');
      // collapse height immediately in parallel
      uiBody.classList.remove('expanded');
      // after fold completes (350ms), swap to search view and fade it in
      setTimeout(() => {
        settingsPanel.classList.remove('active','hiding');
        searchView.classList.remove('hidden','hiding');
        requestAnimationFrame(() => requestAnimationFrame(() => searchView.classList.add('visible')));
        setTimeout(() => inp.focus(), 100);
      }, 170);
    }

    settingsBtn.addEventListener('click', () => {
      settingsBtn.classList.remove('spinning'); void settingsBtn.offsetWidth; settingsBtn.classList.add('spinning');
      settingsBtn.addEventListener('animationend', () => settingsBtn.classList.remove('spinning'), { once: true });
      settingsOpen ? closeSettings() : openSettings();
    });
    document.addEventListener('keydown', e => { if (e.key==='Escape' && settingsOpen) closeSettings(); });

    document.getElementById('cfg-engine').addEventListener('change', e => {
      SETTINGS.search.engine = e.target.value;
      document.getElementById('engine-name').textContent = e.target.value;
    });
    document.getElementById('cfg-jokes-save').addEventListener('click', () => { SETTINGS.jokesFile = document.getElementById('cfg-jokes').value.trim(); loadJokes(SETTINGS.jokesFile); });
    document.getElementById('cfg-playlist-save').addEventListener('click', () => { SETTINGS.player.playlistDir = document.getElementById('cfg-playlist').value.trim(); });
    document.getElementById('cfg-accent-save').addEventListener('click', () => {
      const c = document.getElementById('cfg-accent').value.trim();
      if (/^#[0-9a-fA-F]{6}$/.test(c)) { SETTINGS.theme.accentColor=c; document.documentElement.style.setProperty('--red',c); }
    });
    document.getElementById('cfg-save-all').addEventListener('click', () => {
      SETTINGS.parallax.scalarX = parseFloat(document.getElementById('cfg-scalarx').value)||10;
      SETTINGS.parallax.scalarY = parseFloat(document.getElementById('cfg-scalary').value)||10;
      SETTINGS.debug = document.getElementById('cfg-debug').value==='true';
      SETTINGS.search.engine = document.getElementById('cfg-engine').value;
      document.getElementById('engine-name').textContent = SETTINGS.search.engine;
      const sp = parseFloat(document.getElementById('cfg-sunpos').value);
      if (!isNaN(sp)) { SETTINGS.sunPosition=sp; document.querySelector('.sun-wrap').style.bottom=sp+'%'; }
      const ps = parseFloat(document.getElementById('cfg-pulse').value);
      if (!isNaN(ps)) { SETTINGS.pulseSpeed=ps; document.querySelector('.sun').style.animationDuration=ps+'s'; }
      if (parallaxInstance) { parallaxInstance.destroy(); parallaxInstance=initParallax(); }
      closeSettings();
    });

    // ── PLAYER ──
    const audio=new Audio(), btnEl=document.getElementById('player-btn'), trackEl=document.getElementById('player-track');
    const iconPlay=document.getElementById('icon-play'), iconPause=document.getElementById('icon-pause');
    let playlist=[], currentIdx=0, playing=false;
    function shuffle(arr) { for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr; }
    function setPlayingUI(s) { playing=s; iconPlay.style.display=s?'none':'block'; iconPause.style.display=s?'block':'none'; }
    function loadTrack(idx) {
      if(!playlist.length){dbg('empty');return;}
      audio.src=SETTINGS.player.playlistDir+playlist[idx];
      trackEl.textContent=playlist[idx].replace(/\.[^.]+$/,'');
      audio.play().then(()=>setPlayingUI(true)).catch(e=>{dbg('play: '+e.message);setPlayingUI(false);});
    }
    audio.addEventListener('ended',()=>{currentIdx=(currentIdx+1)%playlist.length;loadTrack(currentIdx);});
    audio.addEventListener('error',()=>{currentIdx=(currentIdx+1)%playlist.length;setTimeout(()=>loadTrack(currentIdx),500);});
    btnEl.addEventListener('click',()=>{
      if(!playlist.length){dbg('no tracks');return;}
      if(playing){audio.pause();setPlayingUI(false);}
      else if(!audio.src||audio.src===window.location.href)loadTrack(currentIdx);
      else audio.play().then(()=>setPlayingUI(true)).catch(e=>dbg(e.message));
    });
    (async()=>{
      try{
        const res=await fetch(SETTINGS.player.playlistDir+'index.json');
        if(!res.ok)throw new Error('HTTP '+res.status);
        const data=await res.json();
        if(!data.tracks?.length)throw new Error('no tracks');
        playlist=shuffle(data.tracks);
        trackEl.textContent=playlist[0].replace(/\.[^.]+$/,'');
        dbg('Loaded '+playlist.length+' tracks');
      }catch(e){dbg('playlist: '+e.message);trackEl.textContent='no playlist';}
    })();
  </script>
</body>
</html>
